services:
  db:
    image: pgvector/pgvector:pg17
    container_name: ydachnik-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    command: ["fastapi", "dev", "--host", "0.0.0.0", "--app", "app", "src/ydachnik_chatbot/app.py"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/code/src
      - ./public:/code/public
      - ./.chainlit:/code/.chainlit
      - ./products.csv:/code/products.csv:ro
      - hf-cache:/opt/huggingface

  loaddata:
    build:
      context: .
      dockerfile: Dockerfile
      target: loaddata
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./products.csv:/code/products.csv:ro
    profiles:
      - loaddata

  ai-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    env_file:
      - .env
    command: ["uv", "run", "pytest", "-o", "addopts=", "-m", "ai", "--capture", "no"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/code/src
      - ./pyproject.toml:/code/pyproject.toml:ro
    profiles:
      - ai-tests

volumes:
  dbdata:
  hf-cache:
